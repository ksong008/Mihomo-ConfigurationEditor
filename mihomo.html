<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihomo (Clash Meta) 配置生成器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    
    <link rel="stylesheet" href="./mihomo.styles.css">
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased h-screen flex flex-col overflow-hidden">
<div id="app" v-cloak class="container mx-auto px-4 max-w-[1600px] py-6 flex flex-col flex-1 min-h-0 overflow-hidden">

    <div v-if="crashError" class="fixed inset-0 bg-slate-900/50 z-[9999] p-4 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-3xl w-full border border-red-200">
            <h1 class="text-2xl font-black text-red-600 mb-2"><i class="fas fa-bug mr-2"></i>应用初始化失败</h1>
            <p class="text-sm text-slate-600 mb-6">很抱歉，应用在加载时遇到致命错误，已被防御机制拦截以防止白屏。请截图下方信息反馈：</p>
            <pre class="bg-slate-900 text-red-400 p-4 rounded-xl text-xs font-mono whitespace-pre-wrap overflow-x-auto max-h-60">{{ crashError }}</pre>
            <div class="mt-6 flex justify-end">
                <button @click="forceClearCache" class="bg-red-600 hover:bg-red-500 text-white px-5 py-2.5 rounded-xl font-bold shadow-md transition flex items-center"><i class="fas fa-trash-alt mr-2"></i>强制清理缓存并重置</button>
            </div>
        </div>
    </div>
    <div v-else-if="cacheWarning" class="fixed inset-0 bg-slate-900/35 z-[9998] p-4 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-6 rounded-2xl shadow-2xl max-w-lg w-full border border-amber-200">
            <h2 class="text-xl font-black text-amber-600 mb-2"><i class="fas fa-database mr-2"></i>检测到缓存异常</h2>
            <p class="text-sm text-slate-600 mb-5">{{ cacheWarning }}</p>
            <div class="flex gap-3 justify-end">
                <button @click="dismissCacheWarning" class="px-4 py-2 rounded-xl border border-slate-300 text-slate-700 font-bold hover:bg-slate-50 transition">稍后处理</button>
                <button @click="forceClearCache" class="px-4 py-2 rounded-xl bg-amber-600 text-white font-bold hover:bg-amber-500 transition">清理缓存并重载</button>
            </div>
        </div>
    </div>

    <template v-else>
        <header class="mb-5 flex justify-between items-end gap-4 shrink-0">
            <div>
                <h1 class="text-3xl font-black text-sky-600 tracking-tight mb-1 flex items-center">
                    <i class="fas fa-cat mr-3 text-sky-500"></i>Mihomo Generator
                    <span class="text-xs bg-gradient-to-r from-sky-500 to-indigo-500 text-white px-2 py-0.5 rounded ml-3 shadow-sm">Beta</span>
                </h1>
                <p class="text-sm text-slate-500 font-medium">基本功能覆盖，不保证100%正确</p>
            </div>
            <div class="flex gap-3">
                <input type="file" ref="fileInput" accept=".yaml,.yml" style="display:none" @change="handleYamlImport">
                <button @click="triggerYamlImport" class="bg-white border border-indigo-200 hover:bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold transition shadow-sm text-sm"><i class="fas fa-file-import mr-1.5"></i>导入 YAML</button>
                <button @click="clearLists" class="bg-white border border-red-200 hover:bg-red-50 text-red-600 px-4 py-2 rounded-xl font-bold transition shadow-sm text-sm"><i class="fas fa-trash-alt mr-1.5"></i>清空列表</button>
                <button @click="forceClearCache" class="bg-white border border-orange-200 hover:bg-orange-50 text-orange-600 px-4 py-2 rounded-xl font-bold transition shadow-sm text-sm"><i class="fas fa-eraser mr-1.5"></i>清理缓存</button>
                <button @click="copyYaml" class="bg-sky-600 hover:bg-sky-500 text-white px-4 py-2 rounded-xl font-bold transition shadow-md text-sm"><i class="fas fa-copy mr-1.5"></i>复制 YAML</button>
                <button @click="downloadYamlWithRename" title="下载前可重命名" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl font-bold transition shadow-md text-sm"><i class="fas fa-download mr-1.5"></i>下载</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 flex-1 min-h-0">

            <div class="xl:col-span-7 bg-white rounded-2xl shadow-lg border border-slate-200 flex flex-col overflow-hidden max-h-full">
                <div class="flex border-b border-slate-200 overflow-x-auto shrink-0 bg-slate-50">
                    <button v-for="tab in tabs" :key="tab.id" @click="currentTab=tab.id" class="flex-shrink-0 py-3.5 px-5 text-sm transition-all text-center border-r border-slate-200/60 last:border-0" :class="currentTab===tab.id?'tab-active':'tab-inactive'">
                        <i :class="tab.icon" class="mr-1.5"></i>{{ tab.name }}
                    </button>
                </div>

                <div id="main-scroll" class="p-6 overflow-y-auto flex-1 bg-slate-50/50" @focusin="handleFocus" @click="handleFocus" @input="handleFocus" @change="handleFocus">

                    <div v-show="currentTab==='general'" class="space-y-6">

                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm" v-if="config.profile">
                            <div class="stitle mb-4"><span class="section-heading"><span class="section-heading-zh">基础端口与系统行为</span><span class="section-heading-en">Ports & System Behavior</span></span></div>

                            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-5 border-b border-slate-100 pb-5">
                                <div data-yaml-target="mixed-port:"><label class="block text-[10px] font-bold text-sky-600 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">混合端口</span><span class="dual-label-en">Mixed Port</span></span></label><input type="number" v-model.number="config['mixed-port']" placeholder="7890" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                <div data-yaml-target="port:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">HTTP 端口</span><span class="dual-label-en">HTTP Port</span></span></label><input type="number" v-model.number="config.port" placeholder="7891" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                <div data-yaml-target="socks-port:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">Socks 端口</span><span class="dual-label-en">Socks Port</span></span></label><input type="number" v-model.number="config['socks-port']" placeholder="7892" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                <div data-yaml-target="redir-port:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">重定向端口</span><span class="dual-label-en">Redir Port</span></span></label><input type="number" v-model.number="config['redir-port']" placeholder="7893" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                <div data-yaml-target="tproxy-port:"><label class="block text-[10px] font-bold text-fuchsia-600 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">透明代理端口</span><span class="dual-label-en">TProxy Port</span></span></label><input type="number" v-model.number="config['tproxy-port']" placeholder="7894" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-fuchsia-400 focus:ring-1 focus:ring-fuchsia-400"></div>
                            </div>

                            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-4">
                                <div data-yaml-target="mode:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">运行模式</span><span class="dual-label-en">Mode</span></span></label>
                                    <select v-model="config.mode" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm font-bold text-sky-700 outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400">
                                        <option value="rule">规则分流</option><option value="global">全局代理</option><option value="direct">全局直连</option>
                                    </select>
                                </div>
                                <div data-yaml-target="log-level:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">日志级别</span><span class="dual-label-en">Log Level</span></span></label>
                                    <select v-model="config['log-level']" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"><option value="info">Info</option><option value="warning">Warning</option><option value="error">Error</option><option value="debug">Debug</option></select>
                                </div>
                                <div data-yaml-target="find-process-mode:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">进程匹配</span><span class="dual-label-en">Find Process Mode</span></span></label>
                                    <select v-model="config['find-process-mode']" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"><option value="always">always</option><option value="strict">strict (推荐)</option><option value="off">off</option></select>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <div class="flex flex-wrap gap-x-6 gap-y-2">
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" data-yaml-target="allow-lan:" v-model="config['allow-lan']" class="w-4 h-4 text-sky-600 rounded"><span class="text-xs font-bold text-slate-700"><span class="dual-label"><span class="dual-label-zh">允许局域网</span><span class="dual-label-en">Allow LAN</span></span></span></label>
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" data-yaml-target="ipv6:" v-model="config.ipv6" class="w-4 h-4 text-sky-600 rounded"><span class="text-xs font-bold text-slate-700"><span class="dual-label"><span class="dual-label-zh">启用 IPv6</span><span class="dual-label-en">Enable IPv6</span></span></span></label>
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" data-yaml-target="tcp-concurrent:" v-model="config['tcp-concurrent']" class="w-4 h-4 text-emerald-600 rounded"><span class="text-xs font-bold text-slate-700"><span class="dual-label"><span class="dual-label-zh">TCP 并发连接</span><span class="dual-label-en">TCP Concurrent</span></span></span></label>
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" data-yaml-target="unified-delay:" v-model="config['unified-delay']" class="w-4 h-4 text-emerald-600 rounded"><span class="text-xs font-bold text-slate-700"><span class="dual-label"><span class="dual-label-zh">统一延迟测速</span><span class="dual-label-en">Unified Delay</span></span></span></label>
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" data-yaml-target="store-selected:" v-model="config.profile['store-selected']" class="w-4 h-4 text-indigo-600 rounded"><span class="text-xs font-bold text-slate-700"><span class="dual-label"><span class="dual-label-zh">记忆节点选择</span><span class="dual-label-en">Store Selected</span></span></span></label>
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" data-yaml-target="store-fake-ip:" v-model="config.profile['store-fake-ip']" class="w-4 h-4 text-indigo-600 rounded"><span class="text-xs font-bold text-slate-700"><span class="dual-label"><span class="dual-label-zh">持久化 Fake-IP</span><span class="dual-label-en">Store Fake-IP</span></span></span></label>
                                    <label class="flex items-center gap-2 cursor-pointer" title="启用后使用 .dat 数据库，关闭则使用 .mmdb"><input type="checkbox" data-yaml-target="geodata-mode:" v-model="config['geodata-mode']" class="w-4 h-4 text-emerald-600 rounded"><span class="text-xs font-bold text-slate-700"><span class="dual-label"><span class="dual-label-zh">使用 Geodata 模式</span><span class="dual-label-en">Geodata Mode</span></span></span></label>
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" data-yaml-target="etag-support:" v-model="config['etag-support']" class="w-4 h-4 text-emerald-600 rounded"><span class="text-xs font-bold text-slate-700"><span class="dual-label"><span class="dual-label-zh">启用 ETag 支持</span><span class="dual-label-en">ETag Support</span></span></span></label>
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" data-yaml-target="disable-keep-alive:" v-model="config['disable-keep-alive']" class="w-4 h-4 text-rose-600 rounded"><span class="text-xs font-bold text-slate-700"><span class="dual-label"><span class="dual-label-zh">禁用 Keep-Alive</span><span class="dual-label-en">Disable Keep-Alive</span></span></span></label>
                                </div>

                                <details class="advanced-section">
                                    <summary>
                                        <span class="advanced-section-label"><i class="fas fa-sliders-h text-sky-500"></i>高级设置 (Advanced Settings)</span>
                                        <span class="advanced-section-chevron"><i class="fas fa-chevron-down"></i></span>
                                    </summary>
                                    <div class="advanced-section-body space-y-4">
                                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                                            <div data-yaml-target="global-client-fingerprint:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">全局指纹</span><span class="dual-label-en">Global Fingerprint</span></span></label>
                                                <select data-yaml-target="global-client-fingerprint:" v-model="config['global-client-fingerprint']" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400">
                                                    <option value="">(不使用)</option><option value="chrome">chrome</option><option value="firefox">firefox</option><option value="safari">safari</option><option value="ios">ios</option><option value="edge">edge</option><option value="qq">qq</option><option value="360">360</option><option value="random">random</option>
                                                </select>
                                            </div>
                                            <div data-yaml-target="interface-name:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">出站网卡绑定</span><span class="dual-label-en">Interface Name</span></span></label><input type="text" v-model="config['interface-name']" placeholder="留空默认" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                            <div data-yaml-target="bind-address:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">局域网绑定地址</span><span class="dual-label-en">Bind Address</span></span></label><input type="text" v-model="config['bind-address']" placeholder="如: * 或 0.0.0.0" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm font-mono outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                            <div data-yaml-target="geodata-loader:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">Geodata 加载器</span><span class="dual-label-en">Geodata Loader</span></span></label>
                                                <select data-yaml-target="geodata-loader:" v-model="config['geodata-loader']" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"><option value="memconservative">memconservative</option><option value="standard">standard</option></select>
                                            </div>
                                            <div data-yaml-target="global-ua:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">全局 User-Agent</span><span class="dual-label-en">Global UA</span></span></label><input type="text" v-model="config['global-ua']" placeholder="留空默认" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                            <div data-yaml-target="keep-alive-interval:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">Keep Alive 间隔</span><span class="dual-label-en">Interval</span></span></label><input type="number" v-model.number="config['keep-alive-interval']" placeholder="留空默认" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm font-mono outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                            <div data-yaml-target="keep-alive-idle:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">Keep Alive 空闲</span><span class="dual-label-en">Idle</span></span></label><input type="number" v-model.number="config['keep-alive-idle']" placeholder="留空默认" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm font-mono outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                        </div>
                                        <div class="grid grid-cols-2 gap-4" v-if="uiState">
                                            <div data-yaml-target="lan-allowed-ips:"><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">允许网段</span><span class="dual-label-en">LAN Allowed IPs</span></span></label><textarea v-model="uiState.generalLanAllowedIps" rows="2" placeholder="0.0.0.0/0&#10;::/0" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-xs font-mono resize-none outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></textarea></div>
                                            <div data-yaml-target="lan-disallowed-ips:"><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">禁止网段</span><span class="dual-label-en">LAN Disallowed IPs</span></span></label><textarea v-model="uiState.generalLanDisallowedIps" rows="2" placeholder="留空不限制" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-xs font-mono resize-none outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></textarea></div>
                                            <div data-yaml-target="authentication:"><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">认证用户</span><span class="dual-label-en">Authentication</span></span></label><textarea v-model="uiState.generalAuthentication" rows="3" placeholder="user:pass&#10;admin:secret" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-xs font-mono resize-none outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></textarea></div>
                                            <div data-yaml-target="skip-auth-prefixes:"><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1"><span class="dual-label"><span class="dual-label-zh">跳过认证前缀</span><span class="dual-label-en">Skip Auth Prefixes</span></span></label><textarea v-model="uiState.generalSkipAuthPrefixes" rows="3" placeholder="127.0.0.1/8&#10;localhost" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-xs font-mono resize-none outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></textarea></div>
                                        </div>
                                    </div>
                                </details>
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm" v-if="config.listeners">
                            <div class="flex justify-between items-center mb-4">
                                <div class="stitle mb-0 text-sky-700"><span class="section-heading"><span class="section-heading-zh">高级入站监听</span><span class="section-heading-en">Listeners</span></span></div>
                                <button @click="addListener" class="bg-sky-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold hover:bg-sky-500 transition"><i class="fas fa-plus mr-1"></i>添加入站</button>
                            </div>
                            <div class="space-y-3 mb-2" data-yaml-target="listeners:">
                                <div v-for="(l, idx) in config.listeners" :key="idx" class="bg-slate-50 p-3 rounded-xl border border-slate-200 relative group shadow-sm hover:border-sky-300 transition-colors">
                                    <button @click="askConfirm('确定删除此入站监听？') && removeListener(idx)" class="absolute top-2 right-2 text-red-400 hover:bg-red-500 hover:text-white w-6 h-6 rounded flex items-center justify-center transition z-10"><i class="fas fa-trash text-xs"></i></button>
                                    <div class="grid grid-cols-12 gap-3 pr-8">
                                        <div class="col-span-3"><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 tracking-wider">名称</label><input type="text" :data-yaml-target="'- name: ' + (l.name || '')" v-model="l.name" class="w-full px-2 py-1.5 bg-white border border-slate-200 rounded-md text-xs font-bold text-sky-700 outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                        <div class="col-span-3">
                                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 tracking-wider"><span class="dual-label"><span class="dual-label-zh">类型</span><span class="dual-label-en">Type</span></span></label>
                                            <select :data-yaml-target="'- name: ' + (l.name || '') + '@@type:'" v-model="l.type" class="w-full px-2 py-1.5 bg-white border border-slate-200 rounded-md text-xs font-bold text-sky-700 outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400">
                                                <option value="mixed">Mixed</option><option value="http">HTTP</option><option value="socks">Socks</option><option value="redir">Redir</option><option value="tunnel">Tunnel</option><option value="tproxy">TProxy</option>
                                            </select>
                                        </div>
                                        <div class="col-span-2"><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 tracking-wider">监听地址</label><input type="text" :data-yaml-target="'- name: ' + (l.name || '') + '@@listen:'" v-model="l.listen" placeholder=":: 或 0.0.0.0" class="w-full px-2 py-1.5 bg-white border border-slate-200 rounded-md text-xs font-mono outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>

                                        <label class="block text-xs font-bold text-slate-700 mb-1.5 uppercase">Mihomo GID</label>
                                        <input type="text" v-model="uiState.nftablesConfig.proxyGid" placeholder="如: 989" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm font-mono">
                                        <p class="text-[10px] text-slate-400 mt-1">建议同时填写 UID 与 GID；若留空，则仅使用较弱的 <code>lo</code> 兜底防回环。</p>
                                    </div>
                                </div>

                                <details class="advanced-section">
                                    <summary>
                                        <span class="advanced-section-label"><i class="fas fa-sliders-h text-fuchsia-500"></i>高级设置 (Advanced TProxy Options)</span>
                                        <span class="advanced-section-chevron"><i class="fas fa-chevron-down"></i></span>
                                    </summary>
                                    <div class="advanced-section-body space-y-4">
                                <div v-if="nftMarkIssues.length > 0" class="bg-rose-50 border border-rose-300 rounded-xl p-4">
                                    <div class="flex justify-between items-start gap-4">
                                        <div>
                                            <div class="text-sm font-black text-rose-700 mb-2"><i class="fas fa-exclamation-triangle mr-1.5"></i>Mark 参数存在问题</div>
                                            <ul class="list-disc pl-5 text-xs text-rose-700 space-y-1">
                                                <li v-for="(msg, i) in nftMarkIssues" :key="i">{{ msg }}</li>
                                            </ul>
                                        </div>
                                        <button @click="resetNftMarksSafe" class="shrink-0 bg-rose-600 hover:bg-rose-500 text-white px-3 py-2 rounded-lg text-xs font-bold transition">恢复安全值 111 / 112</button>
                                    </div>
                                </div>
                                <div v-else class="bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-xs text-emerald-700 font-bold">
                                    <i class="fas fa-check-circle mr-1.5"></i>Mark 校验通过：代理 Mark 与路由 Mark 已分离，且未使用保留路由表号。
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                    <div data-yaml-target="routing-mark:">
                                        <label class="block text-xs font-bold text-slate-700 mb-0.5 uppercase">Route Mark (自身出站) / hex or dec</label>
                                        <p class="text-[10px] text-slate-400 mb-1.5">用于 Mihomo 自身出站流量，自动同步为 YAML 的 <code>routing-mark</code></p>
                                        <input type="text" v-model="uiState.nftablesConfig.routeMarkHex" @blur="sanitizeNftMarks" placeholder="112 或 0x70" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm font-mono">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-700 mb-0.5 uppercase">Proxy Mark (导流流量) / hex or dec</label>
                                        <p class="text-[10px] text-slate-400 mb-1.5">用于 nft fwmark 与策略路由表号，建议与 Route Mark 不同</p>
                                        <input type="text" v-model="uiState.nftablesConfig.tproxyMarkHex" @blur="sanitizeNftMarks" placeholder="111 或 0x6f" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm font-mono">
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 gap-4 bg-white p-4 rounded-xl border border-slate-200">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-700 mb-2 uppercase">DNS 劫持</label>
                                        <label class="flex items-center gap-2 cursor-pointer">
                                            <input type="checkbox" v-model="uiState.nftablesConfig.hijackDns" class="w-4 h-4 text-fuchsia-600 rounded">
                                            <span class="text-sm font-bold text-slate-700">启用劫持</span>
                                        </label>
                                        <p class="text-[10px] text-slate-400 mt-1">内部固定使用 NAT / redirect 到 <code>:{{ dnsListenPort }}</code>；回包保护默认启用。</p>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white p-4 rounded-xl border border-slate-200">
                                    <div>
                                        <label class="flex items-center gap-2 cursor-pointer mb-2">
                                            <input type="checkbox" v-model="uiState.nftablesConfig.filterPorts" class="w-4 h-4 text-fuchsia-600 rounded">
                                            <span class="text-sm font-bold text-slate-700">仅代理指定端口</span>
                                        </label>
                                        <input type="text" v-model="uiState.nftablesConfig.commonPorts" :disabled="!uiState.nftablesConfig.filterPorts" placeholder="22,587,465,995,993,143,80,443,853,9418" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-md text-sm font-mono disabled:opacity-50">
                                        <p class="text-[10px] text-slate-400 mt-1">
                                            默认内置端口：<code>22,587,465,995,993,143,80,443,853,9418</code>，可手动追加。<br>
                                            DNS <code>53</code> 建议交给“DNS 劫持”或“本地 53 前端转发”单独处理。
                                        </p>
                                    </div>
                                    <div>
                                        <label class="flex items-center gap-2 cursor-pointer mb-2">
                                            <input type="checkbox" v-model="uiState.nftablesConfig.bypassCnIp" class="w-4 h-4 text-fuchsia-600 rounded">
                                            <span class="text-sm font-bold text-slate-700">底层绕过中国 IP</span>
                                        </label>
                                        <p class="text-[10px] text-slate-400 mb-2">如果启用，会在 nft 层直接放行大陆网段，而不是交给 Mihomo 路由规则决定。</p>
                                        <div class="text-[10px] text-amber-600 font-bold">为空时不会生成 cn_ip / cn_ip6 集合。</div>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-xs font-bold text-fuchsia-700 mb-1.5 uppercase">保留地址集合 IPv4</label>
                                        <textarea v-model="uiState.nftablesConfig.privateIps" rows="5" class="w-full px-3 py-2 bg-white border border-fuchsia-200 rounded-md text-xs font-mono resize-none outline-none focus:border-fuchsia-400 focus:ring-1 focus:ring-fuchsia-400"></textarea>
                                        <p class="text-[10px] text-slate-400 mt-1">会自动跳过与 Fake-IP 完全同名的条目，避免把 Fake-IP 直接放行。</p>
                                    </div>
                                    <div v-if="uiState.nftablesConfig.tproxyIpv6">
                                        <label class="block text-xs font-bold text-fuchsia-700 mb-1.5 uppercase">保留地址集合 IPv6</label>
                                        <textarea v-model="uiState.nftablesConfig.privateIpsV6" rows="5" class="w-full px-3 py-2 bg-white border border-fuchsia-200 rounded-md text-xs font-mono resize-none outline-none focus:border-fuchsia-400 focus:ring-1 focus:ring-fuchsia-400"></textarea>
                                    </div>
                                </div>

                                <div v-if="uiState.nftablesConfig.bypassCnIp" class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-700 mb-1.5 uppercase">中国 IPv4 段</label>
                                        <textarea v-model="uiState.nftablesConfig.cnIps" rows="5" placeholder="1.0.1.0/24&#10;1.0.2.0/23" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-xs font-mono resize-none"></textarea>
                                    </div>
                                    <div v-if="uiState.nftablesConfig.tproxyIpv6">
                                        <label class="block text-xs font-bold text-slate-700 mb-1.5 uppercase">中国 IPv6 段</label>
                                        <textarea v-model="uiState.nftablesConfig.cnIpsV6" rows="5" placeholder="2408:8000::/20" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-xs font-mono resize-none"></textarea>
                                    </div>
                                </div>
                                    </div>
                                </details>

                                <div>
                                    <div class="flex justify-between items-end mb-2">
                                        <label class="block text-[10px] font-bold text-slate-400 uppercase">系统策略路由命令（必须执行）</label>
                                        <button @click="copyCommands" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-3 py-1.5 rounded text-xs font-bold transition"><i class="fas fa-copy mr-1"></i>复制命令</button>
                                    </div>
                                    <pre class="w-full px-4 py-3 bg-[#1e1e1e] text-emerald-400 border border-slate-800 rounded-xl text-xs font-mono overflow-x-auto whitespace-pre-wrap">{{ routingCommands }}</pre>
                                    <p class="text-[9px] text-slate-400 mt-1">策略路由表号直接取 Proxy Mark；Route Mark 仅给 Mihomo 自身出站流量使用。</p>
                                </div>

                                <div class="mt-4">
                                    <div class="stitle mb-3 !border-l-emerald-500 text-emerald-700">持久化脚本与路由规则生成</div>

                                    <div class="flex flex-col gap-4 mb-4">
                                        <div class="w-full border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                            <div class="bg-slate-100 px-3 py-2 border-b border-slate-200 flex justify-between items-center">
                                                <span class="text-xs font-bold text-slate-600"><i class="fas fa-file-alt mr-1.5"></i>/etc/mihomo/{{ uiState.nftablesConfig.nftTable || 'mihomo' }}.nft</span>
                                                <div class="flex gap-2">
                                                    <button @click="copyNftables" class="text-indigo-600 hover:text-indigo-700 text-[10px] font-bold"><i class="fas fa-copy mr-1"></i>复制</button>
                                                    <button @click="downloadNftables" class="text-emerald-600 hover:text-emerald-700 text-[10px] font-bold"><i class="fas fa-download mr-1"></i>下载</button>
                                                </div>
                                            </div>
                                            <pre class="p-3 bg-[#1e1e1e] text-[#d4d4d4] text-[10px] font-mono overflow-y-auto max-h-72">{{ nftablesScript }}</pre>
                                        </div>

                                        <div class="w-full border border-slate-200 rounded-xl overflow-hidden shadow-sm transition-all">
                                            <button @click="uiState.showSystemdService = !uiState.showSystemdService" class="w-full px-3 py-2 flex justify-between items-center bg-slate-100 hover:bg-slate-200/60 transition-colors focus:outline-none">
                                                <span class="text-xs font-bold text-slate-600"><i class="fas fa-server mr-1.5"></i>/etc/systemd/system/mihomo-tproxy.service</span>
                                                <i class="fas text-slate-500 transition-transform" :class="uiState.showSystemdService ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                                            </button>
                                            <div v-show="uiState.showSystemdService" class="border-t border-slate-200">
                                                <pre class="p-3 bg-[#1e1e1e] text-emerald-400 text-[10px] font-mono overflow-y-auto max-h-60">{{ systemdService }}</pre>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="bg-indigo-50 border border-indigo-200 rounded-xl relative overflow-hidden transition-all">
                                        <button @click="uiState.showInstallScript = !uiState.showInstallScript" class="w-full px-4 py-3 flex justify-between items-center bg-indigo-100/50 hover:bg-indigo-100 transition-colors focus:outline-none">
                                            <span class="text-xs font-black text-indigo-800"><i class="fas fa-terminal mr-1.5"></i>快速安装指南（一键部署脚本）</span>
                                            <i class="fas text-indigo-500 transition-transform" :class="uiState.showInstallScript ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                                        </button>

                                        <div v-show="uiState.showInstallScript" class="p-4 border-t border-indigo-100 relative">
                                            <button @click="copyInstallScript" class="absolute top-4 right-4 bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded text-xs font-bold transition shadow-sm"><i class="fas fa-magic mr-1.5"></i>复制脚本</button>
                                            <p class="text-[10px] text-indigo-700 mb-2 pr-40">脚本会创建 nft 文件、systemd 服务，并立即启动与设置开机自启。</p>
                                            <pre class="w-full px-3 py-2.5 bg-slate-900 text-sky-300 border border-slate-800 rounded-lg text-[10px] font-mono overflow-x-auto whitespace-pre-wrap">{{ installScript }}</pre>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>            <div class="xl:col-span-5 bg-[#1e1e1e] rounded-2xl shadow-xl flex flex-col overflow-hidden border border-slate-800 max-h-full relative">
                <div class="bg-[#2d2d2d] px-5 py-3 border-b border-[#3d3d3d] flex justify-between items-center shrink-0 z-10 shadow-sm">
                    <span class="text-slate-200 font-mono text-sm font-bold"><i class="fas fa-file-code mr-2 text-sky-400"></i>config.yaml</span>
                    <span class="text-[10px] text-emerald-400 font-bold flex items-center gap-1 transition-all" :class="{'text-sky-400 scale-105': isLocating}">
                        <i class="fas" :class="isLocating ? 'fa-location-crosshairs' : 'fa-magic'"></i> {{ renderStatus }}
                    </span>
                </div>
                <div class="flex-1 overflow-y-auto p-5 dark-scroll scroll-smooth" ref="yamlPreviewBox">
                    <pre class="text-[#d4d4d4] font-mono text-[11px] leading-relaxed whitespace-pre overflow-x-auto"><span id="yaml-general">{{ yamlSections.general }}</span><span id="yaml-experimental">{{ yamlSections.experimental }}</span><span id="yaml-network">{{ yamlSections.network }}</span><span id="yaml-proxies">{{ yamlSections.proxies }}</span><span id="yaml-providers">{{ yamlSections.providers }}</span><span id="yaml-rule-providers">{{ yamlSections.ruleProviders }}</span><span id="yaml-groups">{{ yamlSections.groups }}</span><span id="yaml-sub-rules">{{ yamlSections.subRules }}</span><span id="yaml-rules">{{ yamlSections.rules }}</span></pre>
                </div>
            </div>

        </div>

        <div v-if="uiState.showTproxyConflict" class="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center backdrop-blur-sm transition-all" @click.self="cancelTproxyEnable">
            <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden border border-slate-200">
                <div class="bg-rose-50 border-b border-rose-100 px-6 py-4 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-rose-100 flex items-center justify-center text-rose-500 shrink-0">
                        <i class="fas fa-exclamation-triangle text-xl"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-black text-rose-700">检测到配置冲突</h3>
                        <p class="text-xs text-rose-600 font-medium mt-0.5">请选择是否修复以下冲突项</p>
                    </div>
                </div>
                <div class="p-6">
                    <ul class="space-y-3 mb-6">
                        <li v-for="(c, i) in uiState.tproxyConflicts" :key="i" class="flex items-start gap-2 text-sm text-slate-700 bg-slate-50 p-3 rounded-lg border border-slate-200">
                            <i class="fas fa-times-circle text-rose-500 mt-0.5"></i>
                            <span class="font-bold">{{ c.desc }}</span>
                        </li>
                    </ul>
                    <div class="flex gap-3">
                        <button @click="cancelTproxyEnable" class="flex-1 px-4 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl font-bold hover:bg-slate-50 transition">取消开启</button>
                        <button @click="resolveTproxyConflicts" class="flex-1 px-4 py-2.5 bg-rose-600 text-white rounded-xl font-bold hover:bg-rose-500 shadow-md transition">一键修复并开启</button>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>



    <script src="./mihomo.helpers.js"></script>
    <script src="./core/state.js"></script>
    <script src="./core/ui-runtime.js"></script>
    <script src="./core/providers.js"></script>
    <script src="./core/import-export.js"></script>
    <script src="./core/persistence.js"></script>
    <script src="./core/bootstrap.js"></script>
    <script src="./modules/proxies.js"></script>
    <script src="./modules/dns.js"></script>
    <script src="./modules/tproxy.js"></script>
    <script src="./modules/rules.js"></script>
    <script src="./modules/yaml.js"></script>
    <script src="./mihomo.app.js"></script>
</body>
</html>
