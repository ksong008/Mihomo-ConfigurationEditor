<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mihomo (Clash Meta) 配置生成器</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

    
    <link rel="stylesheet" href="./mihomo.styles.css">
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased h-screen flex flex-col overflow-hidden">
<div id="app" v-cloak class="container mx-auto px-4 max-w-[1600px] py-6 flex flex-col flex-1 min-h-0 overflow-hidden">

    <div v-if="crashError" class="fixed inset-0 bg-slate-900/50 z-[9999] p-4 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-3xl w-full border border-red-200">
            <h1 class="text-2xl font-black text-red-600 mb-2"><i class="fas fa-bug mr-2"></i>应用初始化失败</h1>
            <p class="text-sm text-slate-600 mb-6">很抱歉，应用在加载时遇到致命错误，已被防御机制拦截以防止白屏。请截图下方信息反馈：</p>
            <pre class="bg-slate-900 text-red-400 p-4 rounded-xl text-xs font-mono whitespace-pre-wrap overflow-x-auto max-h-60">{{ crashError }}</pre>
            <div class="mt-6 flex justify-end">
                <button @click="forceClearCache" class="bg-red-600 hover:bg-red-500 text-white px-5 py-2.5 rounded-xl font-bold shadow-md transition flex items-center"><i class="fas fa-trash-alt mr-2"></i>强制清理缓存并重置</button>
            </div>
        </div>
    </div>

    <template v-else>
        <header class="mb-5 flex justify-between items-end gap-4 shrink-0">
            <div>
                <h1 class="text-3xl font-black text-sky-600 tracking-tight mb-1 flex items-center">
                    <i class="fas fa-cat mr-3 text-sky-500"></i>Mihomo Generator
                    <span class="text-xs bg-gradient-to-r from-sky-500 to-indigo-500 text-white px-2 py-0.5 rounded ml-3 shadow-sm">Beta</span>
                </h1>
                <p class="text-sm text-slate-500 font-medium">基本功能覆盖，不保证100%正确</p>
            </div>
            <div class="flex gap-3">
                <input type="file" ref="fileInput" accept=".yaml,.yml" style="display:none" @change="handleYamlImport">
                <button @click="triggerYamlImport" class="bg-white border border-indigo-200 hover:bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl font-bold transition shadow-sm text-sm"><i class="fas fa-file-import mr-1.5"></i>导入 YAML</button>
                <button @click="clearLists" class="bg-white border border-red-200 hover:bg-red-50 text-red-600 px-4 py-2 rounded-xl font-bold transition shadow-sm text-sm"><i class="fas fa-trash-alt mr-1.5"></i>清空列表</button>
                <button @click="forceClearCache" class="bg-white border border-orange-200 hover:bg-orange-50 text-orange-600 px-4 py-2 rounded-xl font-bold transition shadow-sm text-sm"><i class="fas fa-eraser mr-1.5"></i>清理缓存</button>
                <button @click="copyYaml" class="bg-sky-600 hover:bg-sky-500 text-white px-4 py-2 rounded-xl font-bold transition shadow-md text-sm"><i class="fas fa-copy mr-1.5"></i>复制 YAML</button>
                <button @click="downloadYaml" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl font-bold transition shadow-md text-sm"><i class="fas fa-download mr-1.5"></i>下载</button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-12 gap-6 flex-1 min-h-0">

            <div class="xl:col-span-7 bg-white rounded-2xl shadow-lg border border-slate-200 flex flex-col overflow-hidden max-h-full">
                <div class="flex border-b border-slate-200 overflow-x-auto shrink-0 bg-slate-50">
                    <button v-for="tab in tabs" :key="tab.id" @click="currentTab=tab.id" class="flex-shrink-0 py-3.5 px-5 text-sm transition-all text-center border-r border-slate-200/60 last:border-0" :class="currentTab===tab.id?'tab-active':'tab-inactive'">
                        <i :class="tab.icon" class="mr-1.5"></i>{{ tab.name }}
                    </button>
                </div>

                <div id="main-scroll" class="p-6 overflow-y-auto flex-1 bg-slate-50/50" @focusin="handleFocus" @click="handleFocus">

                    <div v-show="currentTab==='general'" class="space-y-6">

                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm" v-if="config.profile">
                            <div class="stitle mb-4">基础端口与系统行为</div>

                            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-5 border-b border-slate-100 pb-5">
                                <div data-yaml-target="mixed-port:"><label class="block text-[10px] font-bold text-sky-600 uppercase mb-1">Mixed 端口</label><input type="number" v-model.number="config['mixed-port']" placeholder="7890" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                <div data-yaml-target="port:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">HTTP 端口</label><input type="number" v-model.number="config.port" placeholder="7891" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                <div data-yaml-target="socks-port:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Socks 端口</label><input type="number" v-model.number="config['socks-port']" placeholder="7892" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                <div data-yaml-target="redir-port:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Redir 端口</label><input type="number" v-model.number="config['redir-port']" placeholder="7893" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                <div data-yaml-target="tproxy-port:"><label class="block text-[10px] font-bold text-fuchsia-600 uppercase mb-1">Tproxy 端口</label><input type="number" v-model.number="config['tproxy-port']" placeholder="7894" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-fuchsia-400 focus:ring-1 focus:ring-fuchsia-400"></div>
                            </div>

                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                                <div data-yaml-target="mode:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">运行模式 (mode)</label>
                                    <select v-model="config.mode" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm font-bold text-sky-700 outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400">
                                        <option value="rule">规则分流</option><option value="global">全局代理</option><option value="direct">全局直连</option>
                                    </select>
                                </div>
                                <div data-yaml-target="global-client-fingerprint:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">全局指纹</label>
                                    <select v-model="config['global-client-fingerprint']" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400">
                                        <option value="">(不使用)</option><option value="chrome">chrome</option><option value="firefox">firefox</option><option value="safari">safari</option><option value="ios">ios</option><option value="edge">edge</option><option value="qq">qq</option><option value="360">360</option><option value="random">random</option>
                                    </select>
                                </div>
                                <div data-yaml-target="interface-name:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">出站网卡绑定</label><input type="text" v-model="config['interface-name']" placeholder="留空默认" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                <div data-yaml-target="log-level:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">日志级别</label>
                                    <select v-model="config['log-level']" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"><option value="info">Info</option><option value="warning">Warning</option><option value="error">Error</option><option value="debug">Debug</option></select>
                                </div>
                                <div data-yaml-target="find-process-mode:"><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">进程匹配</label>
                                    <select v-model="config['find-process-mode']" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"><option value="always">always</option><option value="strict">strict (推荐)</option><option value="off">off</option></select>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <div class="flex flex-wrap gap-x-6 gap-y-2">
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" v-model="config['allow-lan']" class="w-4 h-4 text-sky-600 rounded"><span class="text-xs font-bold text-slate-700">允许局域网 (allow-lan)</span></label>
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" v-model="config.ipv6" class="w-4 h-4 text-sky-600 rounded"><span class="text-xs font-bold text-slate-700">启用 IPv6 (ipv6)</span></label>
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" v-model="config.profile['store-selected']" class="w-4 h-4 text-indigo-600 rounded"><span class="text-xs font-bold text-slate-700">记忆节点选择</span></label>
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" v-model="config.profile['store-fake-ip']" class="w-4 h-4 text-indigo-600 rounded"><span class="text-xs font-bold text-slate-700">持久化 Fake-IP</span></label>
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" v-model="config['tcp-concurrent']" class="w-4 h-4 text-emerald-600 rounded"><span class="text-xs font-bold text-slate-700">TCP 并发连接</span></label>
                                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" v-model="config['unified-delay']" class="w-4 h-4 text-emerald-600 rounded"><span class="text-xs font-bold text-slate-700">统一延迟测速</span></label>
                                    <label class="flex items-center gap-2 cursor-pointer" title="启用后使用 .dat 数据库，关闭则使用 .mmdb"><input type="checkbox" v-model="config['geodata-mode']" class="w-4 h-4 text-emerald-600 rounded"><span class="text-xs font-bold text-slate-700">使用 Geodata 模式</span></label>
                                </div>
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm" v-if="config.listeners">
                            <div class="flex justify-between items-center mb-4">
                                <div class="stitle mb-0 text-sky-700">高级入站监听 (Listeners)</div>
                                <button @click="addListener" class="bg-sky-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold hover:bg-sky-500 transition"><i class="fas fa-plus mr-1"></i>添加入站</button>
                            </div>
                            <div class="space-y-3 mb-2" data-yaml-target="listeners:">
                                <div v-for="(l, idx) in config.listeners" :key="idx" class="bg-slate-50 p-3 rounded-xl border border-slate-200 relative group shadow-sm hover:border-sky-300 transition-colors">
                                    <button @click="askConfirm('确定删除此入站监听？') && removeListener(idx)" class="absolute top-2 right-2 text-red-400 hover:bg-red-500 hover:text-white w-6 h-6 rounded flex items-center justify-center transition z-10"><i class="fas fa-trash text-xs"></i></button>
                                    <div class="grid grid-cols-12 gap-3 pr-8">
                                        <div class="col-span-3"><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 tracking-wider">名称</label><input type="text" v-model="l.name" class="w-full px-2 py-1.5 bg-white border border-slate-200 rounded-md text-xs font-bold text-sky-700 outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                        <div class="col-span-3">
                                            <label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 tracking-wider">类型 (Type)</label>
                                            <select v-model="l.type" class="w-full px-2 py-1.5 bg-white border border-slate-200 rounded-md text-xs font-bold text-sky-700 outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400">
                                                <option value="mixed">Mixed</option><option value="http">HTTP</option><option value="socks">Socks</option><option value="redir">Redir</option><option value="tunnel">Tunnel</option><option value="tproxy">TProxy</option>
                                            </select>
                                        </div>
                                        <div class="col-span-2"><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 tracking-wider">监听地址</label><input type="text" v-model="l.listen" placeholder=":: 或 0.0.0.0" class="w-full px-2 py-1.5 bg-white border border-slate-200 rounded-md text-xs font-mono outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                        <div class="col-span-2"><label class="block text-[10px] font-bold text-slate-500 uppercase mb-1 tracking-wider">端口</label><input type="number" v-model.number="l.port" class="w-full px-2 py-1.5 bg-white border border-slate-200 rounded-md text-xs font-mono outline-none focus:border-sky-400 focus:ring-1 focus:ring-sky-400"></div>
                                        <div class="col-span-2 flex items-center pt-5 pl-2"><label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" v-model="l.udp" class="w-3.5 h-3.5 text-sky-500 rounded border-slate-300"><span class="text-[10px] font-bold text-slate-600">开启 UDP</span></label></div>
                                    </div>
                                </div>
                                <div v-if="config.listeners.length===0" class="text-center py-4 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 text-sm font-bold">无附加高级监听器，仅使用上方基础端口</div>
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm" data-yaml-target="external-controller:" v-if="panels">
                            <div class="flex justify-between items-start mb-4">
                                <div><div class="stitle mb-2 !border-l-indigo-500 text-indigo-700">Web 面板 (外部控制)</div></div>
                                <label class="flex items-center gap-2 cursor-pointer bg-indigo-50 px-3 py-1.5 rounded-lg border border-indigo-200 shadow-sm transition hover:bg-indigo-100">
                                    <input type="checkbox" v-model="uiState.useMirrorForPanels" class="w-4 h-4 text-indigo-600 rounded"><span class="text-xs font-bold text-indigo-800">使用 jsDelivr 加速</span>
                                </label>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
                                <div v-for="p in panels" :key="p.id" @click="pickPanel(p)" class="panel-card" :class="{selected: uiState.selectedPanel === p.id}">
                                    <div class="flex flex-col items-center text-center gap-2"><i :class="p.icon" class="text-indigo-500 text-2xl"></i><div><div class="text-sm font-extrabold text-slate-800">{{ p.name }}</div></div></div>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4" v-if="config">
                                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">监听地址</label><input type="text" v-model="config['external-controller']" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm font-mono outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400"></div>
                                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">API 密钥</label><input type="text" v-model="config.secret" placeholder="留空无密码" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400"></div>
                                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">面板目录</label><input type="text" v-model="config['external-ui']" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-sm font-mono outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400"></div>
                                <div><label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">下载直链</label><input type="text" v-model="config['external-ui-url']" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-xs font-mono text-indigo-600 outline-none focus:border-indigo-400 focus:ring-1 focus:ring-indigo-400"></div>
                            </div>
                        </div>

                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-blue-500" data-yaml-target="geox-url:" v-if="config.geo">
                            <div class="flex justify-between items-start mb-4">
                                <div><div class="stitle mb-0 !border-l-0 !pl-0 text-blue-700">Geo 数据库设置 (GEOIP / GEOSITE)</div></div>
                                <div class="flex items-center gap-3">
                                    <label class="flex items-center gap-2 cursor-pointer bg-blue-50 px-3 py-1.5 rounded-lg border border-blue-200 shadow-sm transition hover:bg-blue-100">
                                        <input type="checkbox" v-model="uiState.useMirrorForGeo" class="w-4 h-4 text-blue-600 rounded">
                                        <span class="text-xs font-bold text-blue-800"><i class="fas fa-bolt mr-1"></i>启用 jsDelivr CDN 镜像加速</span>
                                    </label>
                                    <button @click="resetGeoUrls" class="text-[10px] text-slate-500 hover:text-blue-600 font-bold transition flex items-center"><i class="fas fa-undo mr-1"></i>恢复默认</button>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                <div class="flex flex-col gap-4">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" v-model="config.geo['auto-update']" class="w-4 h-4 text-blue-600 rounded">
                                        <span class="text-sm font-bold text-slate-700">启用字典自动更新</span>
                                    </label>
                                    <div>
                                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">更新间隔 (小时)</label>
                                        <input type="number" v-model.number="config.geo.interval" class="w-32 px-3 py-2 bg-white border border-slate-200 rounded-md text-sm outline-none focus:ring-1 focus:border-blue-400">
                                    </div>
                                </div>
                                <div class="space-y-3" v-if="config.geo.url">
                                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">下载源地址</label>
                                    <div class="flex items-center gap-2">
                                        <span class="text-[10px] font-bold text-slate-400 w-12">GEOIP</span>
                                        <input type="text" v-model="config.geo.url.geoip" class="flex-1 px-2 py-1.5 bg-white border border-slate-200 rounded-md text-[10px] font-mono text-slate-500 outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span class="text-[10px] font-bold text-slate-400 w-12">GEOSITE</span>
                                        <input type="text" v-model="config.geo.url.geosite" class="flex-1 px-2 py-1.5 bg-white border border-slate-200 rounded-md text-[10px] font-mono text-slate-500 outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <span class="text-[10px] font-bold text-slate-400 w-12">MMDB</span>
                                        <input type="text" v-model="config.geo.url.mmdb" class="flex-1 px-2 py-1.5 bg-white border border-slate-200 rounded-md text-[10px] font-mono text-slate-500 outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div v-show="currentTab==='network'" class="space-y-6">
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm border-l-4 border-l-purple-500" data-yaml-target="tun:" v-if="config && config.tun">
                            <div class="flex justify-between items-center mb-4">
                                <div class="stitle mb-0 !border-l-0 !pl-0 text-purple-700">TUN 透明代理</div>
                                <label class="toggle-switch"><input type="checkbox" v-model="config.tun.enable" @change="handleTunToggle"><span class="toggle-slider"></span></label>
                            </div>
                            <div v-if="config.tun.enable" class="space-y-4 bg-purple-50 p-4 rounded-xl border border-purple-100">
                                <div class="grid grid-cols-3 gap-4">
                                    <div><label class="block text-[10px] font-bold text-purple-600 uppercase mb-1">TUN 栈 (stack)</label><select v-model="config.tun.stack" class="w-full px-2 py-1.5 bg-white border border-purple-200 rounded-md text-xs outline-none focus:ring-1 focus:ring-purple-400"><option value="system">system</option><option value="gvisor">gvisor</option><option value="mixed">mixed</option></select></div>
                                    <div><label class="block text-[10px] font-bold text-purple-600 uppercase mb-1" title="macOS必须留空或配置为utunX格式">网卡名称 (device)</label><input type="text" v-model="config.tun.device" placeholder="留空自动分配" class="w-full px-2 py-1.5 bg-white border border-purple-200 rounded-md text-xs font-mono outline-none focus:ring-1 focus:ring-purple-400"></div>
                                    <div><label class="block text-[10px] font-bold text-purple-600 uppercase mb-1">最大传输单元 (MTU)</label><input type="number" v-model.number="config.tun.mtu" placeholder="1500" class="w-full px-2 py-1.5 bg-white border border-purple-200 rounded-md text-xs font-mono outline-none focus:ring-1 focus:ring-purple-400"></div>
                                    <div><label class="block text-[10px] font-bold text-purple-600 uppercase mb-1">GSO 最大尺寸</label><input type="number" v-model.number="config.tun['gso-max-size']" :disabled="!config.tun.gso" class="w-full px-2 py-1.5 bg-white border border-purple-200 rounded-md text-xs font-mono disabled:opacity-50 outline-none focus:ring-1 focus:ring-purple-400"></div>
                                    <div class="col-span-2">
                                        <label class="flex items-center gap-2 cursor-pointer mb-2">

                                        <input type="text" v-model="uiState.nftablesConfig.commonPorts" :disabled="!uiState.nftablesConfig.filterPorts" placeholder="22,587,465,995,993,143,80,443,853,9418" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-md text-sm font-mono disabled:opacity-50">
                                        <p class="text-[10px] text-slate-400 mt-1">
                                            默认内置端口：<code>22,587,465,995,993,143,80,443,853,9418</code>，可手动追加。<br>
                                            DNS <code>53</code> 建议交给“DNS 劫持”或“本地 53 前端转发”单独处理。
                                        </p>
                                    </div>
                                    <div>
                                        <label class="flex items-center gap-2 cursor-pointer mb-2">
                                            <input type="checkbox" v-model="uiState.nftablesConfig.bypassCnIp" class="w-4 h-4 text-fuchsia-600 rounded">
                                            <span class="text-sm font-bold text-slate-700">底层绕过中国 IP</span>
                                        </label>
                                        <p class="text-[10px] text-slate-400 mb-2">如果启用，会在 nft 层直接放行大陆网段，而不是交给 Mihomo 路由规则决定。</p>
                                        <div class="text-[10px] text-amber-600 font-bold">为空时不会生成 cn_ip / cn_ip6 集合。</div>
                                    </div>
                                </div>

                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-xs font-bold text-fuchsia-700 mb-1.5 uppercase">保留地址集合 IPv4</label>
                                        <textarea v-model="uiState.nftablesConfig.privateIps" rows="5" class="w-full px-3 py-2 bg-white border border-fuchsia-200 rounded-md text-xs font-mono resize-none outline-none focus:border-fuchsia-400 focus:ring-1 focus:ring-fuchsia-400"></textarea>
                                        <p class="text-[10px] text-slate-400 mt-1">会自动跳过与 Fake-IP 完全同名的条目，避免把 Fake-IP 直接放行。</p>
                                    </div>
                                    <div v-if="uiState.nftablesConfig.tproxyIpv6">
                                        <label class="block text-xs font-bold text-fuchsia-700 mb-1.5 uppercase">保留地址集合 IPv6</label>
                                        <textarea v-model="uiState.nftablesConfig.privateIpsV6" rows="5" class="w-full px-3 py-2 bg-white border border-fuchsia-200 rounded-md text-xs font-mono resize-none outline-none focus:border-fuchsia-400 focus:ring-1 focus:ring-fuchsia-400"></textarea>
                                    </div>
                                </div>

                                <div v-if="uiState.nftablesConfig.bypassCnIp" class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-200">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-700 mb-1.5 uppercase">中国 IPv4 段</label>
                                        <textarea v-model="uiState.nftablesConfig.cnIps" rows="5" placeholder="1.0.1.0/24&#10;1.0.2.0/23" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-xs font-mono resize-none"></textarea>
                                    </div>
                                    <div v-if="uiState.nftablesConfig.tproxyIpv6">
                                        <label class="block text-xs font-bold text-slate-700 mb-1.5 uppercase">中国 IPv6 段</label>
                                        <textarea v-model="uiState.nftablesConfig.cnIpsV6" rows="5" placeholder="2408:8000::/20" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-md text-xs font-mono resize-none"></textarea>
                                    </div>
                                </div>

                                <div>
                                    <div class="flex justify-between items-end mb-2">
                                        <label class="block text-[10px] font-bold text-slate-400 uppercase">系统策略路由命令（必须执行）</label>
                                        <button @click="copyCommands" class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-3 py-1.5 rounded text-xs font-bold transition"><i class="fas fa-copy mr-1"></i>复制命令</button>
                                    </div>
                                    <pre class="w-full px-4 py-3 bg-[#1e1e1e] text-emerald-400 border border-slate-800 rounded-xl text-xs font-mono overflow-x-auto whitespace-pre-wrap">{{ routingCommands }}</pre>
                                    <p class="text-[9px] text-slate-400 mt-1">策略路由表号直接取 Proxy Mark；Route Mark 仅给 Mihomo 自身出站流量使用。</p>
                                </div>

                                <div class="mt-4">
                                    <div class="stitle mb-3 !border-l-emerald-500 text-emerald-700">持久化脚本与路由规则生成</div>

                                    <div class="flex flex-col gap-4 mb-4">
                                        <div class="w-full border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                            <div class="bg-slate-100 px-3 py-2 border-b border-slate-200 flex justify-between items-center">
                                                <span class="text-xs font-bold text-slate-600"><i class="fas fa-file-alt mr-1.5"></i>/etc/mihomo/{{ uiState.nftablesConfig.nftTable || 'mihomo' }}.nft</span>
                                                <div class="flex gap-2">
                                                    <button @click="copyNftables" class="text-indigo-600 hover:text-indigo-700 text-[10px] font-bold"><i class="fas fa-copy mr-1"></i>复制</button>
                                                    <button @click="downloadNftables" class="text-emerald-600 hover:text-emerald-700 text-[10px] font-bold"><i class="fas fa-download mr-1"></i>下载</button>
                                                </div>
                                            </div>
                                            <pre class="p-3 bg-[#1e1e1e] text-[#d4d4d4] text-[10px] font-mono overflow-y-auto max-h-72">{{ nftablesScript }}</pre>
                                        </div>

                                        <div class="w-full border border-slate-200 rounded-xl overflow-hidden shadow-sm transition-all">
                                            <button @click="uiState.showSystemdService = !uiState.showSystemdService" class="w-full px-3 py-2 flex justify-between items-center bg-slate-100 hover:bg-slate-200/60 transition-colors focus:outline-none">
                                                <span class="text-xs font-bold text-slate-600"><i class="fas fa-server mr-1.5"></i>/etc/systemd/system/mihomo-tproxy.service</span>
                                                <i class="fas text-slate-500 transition-transform" :class="uiState.showSystemdService ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                                            </button>
                                            <div v-show="uiState.showSystemdService" class="border-t border-slate-200">
                                                <pre class="p-3 bg-[#1e1e1e] text-emerald-400 text-[10px] font-mono overflow-y-auto max-h-60">{{ systemdService }}</pre>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="bg-indigo-50 border border-indigo-200 rounded-xl relative overflow-hidden transition-all">
                                        <button @click="uiState.showInstallScript = !uiState.showInstallScript" class="w-full px-4 py-3 flex justify-between items-center bg-indigo-100/50 hover:bg-indigo-100 transition-colors focus:outline-none">
                                            <span class="text-xs font-black text-indigo-800"><i class="fas fa-terminal mr-1.5"></i>快速安装指南（一键部署脚本）</span>
                                            <i class="fas text-indigo-500 transition-transform" :class="uiState.showInstallScript ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
                                        </button>

                                        <div v-show="uiState.showInstallScript" class="p-4 border-t border-indigo-100 relative">
                                            <button @click="copyInstallScript" class="absolute top-4 right-4 bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1.5 rounded text-xs font-bold transition shadow-sm"><i class="fas fa-magic mr-1.5"></i>复制脚本</button>
                                            <p class="text-[10px] text-indigo-700 mb-2 pr-40">脚本会创建 nft 文件、systemd 服务，并立即启动与设置开机自启。</p>
                                            <pre class="w-full px-3 py-2.5 bg-slate-900 text-sky-300 border border-slate-800 rounded-lg text-[10px] font-mono overflow-x-auto whitespace-pre-wrap">{{ installScript }}</pre>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>            <div class="xl:col-span-5 bg-[#1e1e1e] rounded-2xl shadow-xl flex flex-col overflow-hidden border border-slate-800 max-h-full relative">
                <div class="bg-[#2d2d2d] px-5 py-3 border-b border-[#3d3d3d] flex justify-between items-center shrink-0 z-10 shadow-sm">
                    <span class="text-slate-200 font-mono text-sm font-bold"><i class="fas fa-file-code mr-2 text-sky-400"></i>config.yaml</span>
                    <span class="text-[10px] text-emerald-400 font-bold flex items-center gap-1 transition-all" :class="{'text-sky-400 scale-105': isLocating}">
                        <i class="fas" :class="isLocating ? 'fa-location-crosshairs' : 'fa-magic'"></i> {{ renderStatus }}
                    </span>
                </div>
                <div class="flex-1 overflow-y-auto p-5 dark-scroll scroll-smooth" ref="yamlPreviewBox">
                    <pre class="text-[#d4d4d4] font-mono text-[11px] leading-relaxed whitespace-pre overflow-x-auto"><span id="yaml-general">{{ yamlSections.general }}</span><span id="yaml-network">{{ yamlSections.network }}</span><span id="yaml-proxies">{{ yamlSections.proxies }}</span><span id="yaml-providers">{{ yamlSections.providers }}</span><span id="yaml-rule-providers">{{ yamlSections.ruleProviders }}</span><span id="yaml-groups">{{ yamlSections.groups }}</span><span id="yaml-rules">{{ yamlSections.rules }}</span></pre>
                </div>
            </div>

        </div>

        <div v-if="uiState.showTproxyConflict" class="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center backdrop-blur-sm transition-all" @click.self="cancelTproxyEnable">
            <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full overflow-hidden border border-slate-200">
                <div class="bg-rose-50 border-b border-rose-100 px-6 py-4 flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-rose-100 flex items-center justify-center text-rose-500 shrink-0">
                        <i class="fas fa-exclamation-triangle text-xl"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-black text-rose-700">检测到配置冲突</h3>
                        <p class="text-xs text-rose-600 font-medium mt-0.5">请选择是否修复以下冲突项</p>
                    </div>
                </div>
                <div class="p-6">
                    <ul class="space-y-3 mb-6">
                        <li v-for="(c, i) in uiState.tproxyConflicts" :key="i" class="flex items-start gap-2 text-sm text-slate-700 bg-slate-50 p-3 rounded-lg border border-slate-200">
                            <i class="fas fa-times-circle text-rose-500 mt-0.5"></i>
                            <span class="font-bold">{{ c.desc }}</span>
                        </li>
                    </ul>
                    <div class="flex gap-3">
                        <button @click="cancelTproxyEnable" class="flex-1 px-4 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-xl font-bold hover:bg-slate-50 transition">取消开启</button>
                        <button @click="resolveTproxyConflicts" class="flex-1 px-4 py-2.5 bg-rose-600 text-white rounded-xl font-bold hover:bg-rose-500 shadow-md transition">一键修复并开启</button>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>



    <script src="./mihomo.helpers.js"></script>
    <script src="./mihomo.app.js"></script>
</body>
</html>
